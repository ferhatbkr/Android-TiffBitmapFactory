name: Build 16KB AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Repoda unutulmuş gradlew yerine dışarıdan uyumlu Gradle kuruyoruz
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.7.1'

      # gradlew yerine doğrudan sisteme kurduğumuz gradle komutu
      - name: Build AAR with NDK
        run: gradle :tiffbitmapfactory:assembleRelease --stacktrace

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-TiffBitmapFactory-16KB
          path: tiffbitmapfactory/build/outputs/aar/tiffbitmapfactory-release.aar
