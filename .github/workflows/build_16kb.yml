name: Build 16KB AAR
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install NDK 28 & Accept Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          mkdir -p $ANDROID_HOME/ndk
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.12990064"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.0.12990064" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.0.12990064" >> $GITHUB_ENV
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Clean
        run: ./gradlew clean
      - name: Build AAR with NDK
        run: ./gradlew :tiffbitmapfactory:assembleRelease --stacktrace
      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-TiffBitmapFactory-16KB
          path: tiffbitmapfactory/build/outputs/aar/tiffbitmapfactory-release.aar
